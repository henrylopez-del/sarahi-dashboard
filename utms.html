<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarahi Jaramillo · UTM Leads · Ainnovation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gray-50:#FAFAFA;--gray-100:#F4F4F5;--gray-200:#E4E4E7;--gray-300:#D4D4D8;
    --gray-400:#A1A1AA;--gray-500:#71717A;--gray-600:#52525B;--gray-700:#3F3F46;
    --gray-800:#27272A;--gray-900:#18181B;
    --success-50:#F0FDF4;--success-100:#DCFCE7;--success-500:#22C55E;--success-700:#15803D;
    --warn-50:#FFFBEB;--warn-100:#FEF3C7;--warn-500:#F59E0B;--warn-700:#B45309;
    --danger-50:#FEF2F2;--danger-100:#FEE2E2;--danger-500:#EF4444;--danger-700:#B91C1C;
    --brand-50:#EFF6FF;--brand-100:#DBEAFE;--brand-500:#3B82F6;--brand-700:#1D4ED8;
    --violet-50:#F5F3FF;--violet-100:#EDE9FE;--violet-500:#8B5CF6;--violet-700:#6D28D9;
    --fb-500:#1877F2;--ig-500:#E1306C;
    --bg:var(--gray-50);--surface:#FFFFFF;--border:var(--gray-200);--border-strong:var(--gray-300);
    --text:var(--gray-900);--text-muted:var(--gray-500);--text-subtle:var(--gray-400);
    --r-sm:6px;--r-md:10px;--r-lg:14px;
    --shadow-sm:0 1px 3px 0 rgba(0,0,0,.06),0 1px 2px -1px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter Tight',-apple-system,sans-serif;font-feature-settings:"ss01","cv11","tnum";-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh}
  body{padding:20px}
  .wrap{max-width:1440px;margin:0 auto}

  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:40px;height:40px;border-radius:var(--r-md);background:var(--gray-900);color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px;letter-spacing:-.02em}
  .brand-meta .eyebrow{font-size:12px;font-weight:500;color:var(--text-muted)}
  .brand-meta h1{font-size:20px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
  .sync{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums;text-align:right}
  .sync .ok{color:var(--success-500);font-weight:700}

  .fbar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:14px;display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px}
  .fgroup{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .fgroup label{font-size:11px;font-weight:500;color:var(--text-muted);margin-right:4px}
  .fbar .sep{width:1px;height:22px;background:var(--border)}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--border);background:var(--surface);border-radius:var(--r-sm);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .12s;font-family:inherit}
  .chip:hover{background:var(--gray-50);border-color:var(--border-strong);color:var(--text)}
  .chip.active{background:var(--gray-900);border-color:var(--gray-900);color:#fff}
  .chip svg{width:12px;height:12px}
  .date-input{font-family:inherit;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);background:var(--surface);font-variant-numeric:tabular-nums;cursor:pointer}
  .date-input:hover{border-color:var(--border-strong)}
  .search-input{font-family:inherit;font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);background:var(--surface);min-width:220px}
  .search-input:focus{outline:2px solid var(--violet-100);border-color:var(--violet-500)}

  .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
  @media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px}
  .kpi:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm)}
  .kpi-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--text-muted);margin-bottom:6px}
  .kpi-dot{width:8px;height:8px;border-radius:2px}
  .kpi-value{font-size:24px;font-weight:600;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
  .kpi-sub{font-size:11px;color:var(--text-muted);margin-top:4px}

  .table-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
  .table-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .table-head h2{font-size:14px;font-weight:600;letter-spacing:-.01em}
  .table-head .panel-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
  .panel-badge{font-size:11px;font-weight:500;color:var(--text-muted);padding:3px 10px;background:var(--gray-100);border-radius:999px}
  .tblwrap{max-height:720px;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;padding:10px 12px;background:var(--gray-50);font-size:11px;font-weight:500;color:var(--text-muted);border-bottom:1px solid var(--border);user-select:none;cursor:pointer;position:sticky;top:0;z-index:1;white-space:nowrap}
  thead th:hover{background:var(--gray-100);color:var(--text)}
  thead th.sorted{background:var(--gray-100);color:var(--text);font-weight:600}
  thead th.sorted::after{content:attr(data-arr);margin-left:4px;font-size:10px}
  thead th.num{text-align:right}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
  tbody tr:last-child{border-bottom:0}
  tbody tr:hover td{background:var(--gray-50)}
  tbody tr.open td{background:var(--violet-50)}
  tbody td{padding:10px 12px;color:var(--text);font-variant-numeric:tabular-nums;font-size:13px;vertical-align:middle}
  tbody td.name{font-weight:500}
  tbody td.muted{color:var(--text-muted)}
  tbody td.mono{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-muted)}

  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;border:1px solid transparent;white-space:nowrap}
  .badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
  .badge-fb{background:#DBEAFE;color:#1D4ED8;border-color:#BFDBFE}
  .badge-ig{background:#FCE7F3;color:#9D174D;border-color:#FBCFE8}
  .badge-org{background:var(--success-50);color:var(--success-700);border-color:var(--success-100)}
  .badge-none{background:var(--gray-100);color:var(--gray-500);border-color:var(--border)}
  .badge-fbig{background:var(--violet-50);color:var(--violet-700);border-color:var(--violet-100)}

  .detail-row{background:var(--gray-50)}
  .detail-wrap{padding:14px 18px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  @media(max-width:800px){.detail-wrap{grid-template-columns:repeat(2,1fr)}}
  .detail-mi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 11px}
  .detail-mi .l{font-size:10px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
  .detail-mi .v{font-size:12px;color:var(--text);font-family:'JetBrains Mono',monospace;word-break:break-all}
  .detail-mi .v.empty{color:var(--text-subtle);font-style:italic;font-family:'Inter Tight',sans-serif}

  .empty{padding:40px 20px;text-align:center;color:var(--text-subtle);font-size:13px}
  .loader{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:13px}
  .loader-dot{display:inline-block;width:6px;height:6px;background:var(--gray-400);border-radius:50%;margin:0 2px;animation:ld 1.4s infinite ease-in-out}
  .loader-dot:nth-child(2){animation-delay:.2s}.loader-dot:nth-child(3){animation-delay:.4s}
  @keyframes ld{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

  .export-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border:1px solid var(--border);background:var(--surface);border-radius:var(--r-sm);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer}
  .export-btn:hover{background:var(--gray-50);border-color:var(--border-strong);color:var(--text)}

  /* GHL overrides */
  .c-section .inner,.c-row .inner,.c-column .inner,.inner{max-width:100vw!important;width:100vw!important;padding:0!important;margin:0!important}
  .c-section,.c-row,.c-column,.c-wrapper,.c-custom-code,.fullSection{max-width:100vw!important;width:100vw!important;padding:0!important;margin:0!important;background:transparent!important;border:none!important;overflow:visible!important}

  /* Tooltip */
  #tt{position:fixed;background:var(--gray-900);color:#fff;padding:8px 10px;border-radius:var(--r-sm);font-size:11px;font-weight:400;white-space:normal;max-width:260px;z-index:9999;pointer-events:none;box-shadow:var(--shadow-sm);line-height:1.45;font-family:'Inter Tight',sans-serif;opacity:0;transition:opacity .12s}
  #tt.on{opacity:1}
</style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="brand">
      <div class="logo">A.</div>
      <div class="brand-meta">
        <div class="eyebrow">Ainnovation · UTM Leads</div>
        <h1>Sarahi Jaramillo</h1>
      </div>
    </div>
    <div class="sync" id="sync">cargando…</div>
  </header>

  <div class="fbar">
    <div class="fgroup">
      <label>Periodo</label>
      <button class="chip preset" data-preset="today">Hoy</button>
      <button class="chip preset" data-preset="7d">7d</button>
      <button class="chip preset" data-preset="30d">30d</button>
      <button class="chip preset active" data-preset="mtd">MTD</button>
      <button class="chip preset" data-preset="lm">Mes pasado</button>
      <button class="chip preset" data-preset="all">Todo</button>
      <input type="date" class="date-input" id="fromD">
      <span style="color:var(--text-subtle);font-size:11px">→</span>
      <input type="date" class="date-input" id="toD">
    </div>
    <div class="sep"></div>
    <div class="fgroup">
      <label>Origen</label>
      <button class="chip src active" data-src="all">Todos</button>
      <button class="chip src" data-src="facebook">Facebook</button>
      <button class="chip src" data-src="instagram">Instagram</button>
      <button class="chip src" data-src="facebook-instagram">FB+IG</button>
      <button class="chip src" data-src="none">Orgánico / directo</button>
    </div>
    <div class="sep"></div>
    <div class="fgroup">
      <label>Buscar</label>
      <input type="search" class="search-input" id="search" placeholder="nombre, email, teléfono, campaña…">
    </div>
  </div>

  <div class="kpi-row" id="kpis"></div>

  <div class="table-panel">
    <div class="table-head">
      <div>
        <h2>Leads</h2>
        <div class="panel-sub" id="subtitle">Ordenados por fecha · más recientes arriba</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="panel-badge" id="count">0</span>
        <button class="export-btn" id="exportCsv">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar CSV
        </button>
      </div>
    </div>
    <div class="tblwrap" id="tblwrap">
      <div class="loader"><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span><br><br>Cargando leads…</div>
    </div>
  </div>

</div>

<script>
const SB_URL='https://fneppfjeywhayknrgahe.supabase.co';
const SB_KEY='sb_publishable_zLroeuC3ZrE-K_zVGFwi3Q_UyYG6ZYB';

const ST={
  preset:'mtd', from:null, to:null,
  src:'all', q:'', sort:'fecha', dir:-1,
  openRows:new Set()
};
let RAW=[];

async function sb(t,p=''){const u=`${SB_URL}/rest/v1/${t}?${p}`;const r=await fetch(u,{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}});return r.json()}
const iso=d=>d.toISOString().slice(0,10);
const today=()=>new Date();
const esc=s=>{const d=document.createElement('div');d.textContent=s||'';return d.innerHTML};

function presetRange(p){
  const t=today();const start=new Date(t);
  if(p==='today')return [iso(t),iso(t)];
  if(p==='7d'){start.setDate(t.getDate()-6);return [iso(start),iso(t)]}
  if(p==='30d'){start.setDate(t.getDate()-29);return [iso(start),iso(t)]}
  if(p==='mtd')return [iso(new Date(t.getFullYear(),t.getMonth(),1)),iso(t)];
  if(p==='lm'){const s=new Date(t.getFullYear(),t.getMonth()-1,1),e=new Date(t.getFullYear(),t.getMonth(),0);return [iso(s),iso(e)]}
  if(p==='all')return ['2020-01-01',iso(t)];
  return [iso(start),iso(t)];
}
function applyPreset(){
  if(ST.preset!=='custom'){const [f,t]=presetRange(ST.preset);ST.from=f;ST.to=t;
    document.getElementById('fromD').value=f;document.getElementById('toD').value=t}
}
function fmtFecha(v){
  if(!v)return '—';
  const d=new Date(v);
  if(isNaN(d))return '—';
  const dd=String(d.getDate()).padStart(2,'0');
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const yy=d.getFullYear();
  return `${dd}/${mm}/${yy}`;
}
function fmtTime(v){
  if(!v)return '';
  const d=new Date(v);if(isNaN(d))return '';
  return d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}

async function loadAll(){
  const leads=await sb('sarahi_meta_utm_leads','select=*&order=fecha.desc&limit=5000');
  RAW=leads||[];
  document.getElementById('sync').innerHTML=`<span class="ok">●</span> ${RAW.length} leads · sync en vivo`;
  applyPreset();
  render();
}

function filtered(){
  const q=ST.q.toLowerCase();
  return RAW.filter(r=>{
    const d=(r.fecha||'').slice(0,10);
    if(d<ST.from||d>ST.to)return false;
    if(ST.src!=='all'){
      const s=(r.utm_source_normalized||'none');
      if(s!==ST.src)return false;
    }
    if(q){
      const hay=[r.nombre,r.correo,r.telefono,r.utm_source,r.utm_campaign,r.utm_content,r.utm_adset,r.estado].map(x=>(x||'').toLowerCase()).join(' ');
      if(!hay.includes(q))return false;
    }
    return true;
  });
}

function sorted(list){
  const k=ST.sort,d=ST.dir;
  return [...list].sort((a,b)=>{
    let va=a[k],vb=b[k];
    if(k==='fecha'){va=a.fecha||'';vb=b.fecha||'';return va<vb?d:va>vb?-d:0}
    va=(va||'').toString();vb=(vb||'').toString();
    return va.localeCompare(vb)*(d===-1?1:-1);
  });
}

function render(){
  const list=sorted(filtered());
  // KPIs
  const fb=list.filter(r=>r.utm_source_normalized==='facebook').length;
  const ig=list.filter(r=>r.utm_source_normalized==='instagram').length;
  const fbig=list.filter(r=>r.utm_source_normalized==='facebook-instagram').length;
  const none=list.filter(r=>!r.utm_source_normalized||r.utm_source_normalized==='none').length;
  const byCamp={};list.forEach(r=>{if(r.utm_campaign)byCamp[r.utm_campaign]=(byCamp[r.utm_campaign]||0)+1});
  const topCamp=Object.entries(byCamp).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label"><span class="kpi-dot" style="background:var(--gray-900)"></span>Total leads</div><div class="kpi-value">${list.length}</div><div class="kpi-sub">en el rango seleccionado</div></div>
    <div class="kpi"><div class="kpi-label"><span class="kpi-dot" style="background:var(--fb-500)"></span>Facebook</div><div class="kpi-value">${fb}</div><div class="kpi-sub">${list.length>0?(fb/list.length*100).toFixed(0):0}% del total</div></div>
    <div class="kpi"><div class="kpi-label"><span class="kpi-dot" style="background:var(--ig-500)"></span>Instagram</div><div class="kpi-value">${ig}</div><div class="kpi-sub">${list.length>0?(ig/list.length*100).toFixed(0):0}% del total</div></div>
    <div class="kpi"><div class="kpi-label"><span class="kpi-dot" style="background:var(--success-500)"></span>Orgánico</div><div class="kpi-value">${none}</div><div class="kpi-sub">sin UTM source</div></div>
    <div class="kpi"><div class="kpi-label"><span class="kpi-dot" style="background:var(--violet-500)"></span>Top campaña</div><div class="kpi-value" style="font-size:14px;line-height:1.2">${topCamp?esc(topCamp[0].slice(0,22)):'—'}${topCamp&&topCamp[0].length>22?'…':''}</div><div class="kpi-sub">${topCamp?topCamp[1]+' leads':'sin data'}</div></div>
  `;

  document.getElementById('count').textContent=`${list.length} leads`;

  // Table
  const cols=[
    {k:'fecha',l:'Fecha'},
    {k:'nombre',l:'Nombre'},
    {k:'correo',l:'Email'},
    {k:'telefono',l:'Teléfono'},
    {k:'utm_source_normalized',l:'Origen'},
    {k:'utm_campaign',l:'Campaña'},
    {k:'utm_content',l:'Creativo (ad)'},
  ];
  let h=`<table><thead><tr>`;
  cols.forEach(c=>{const sr=c.k===ST.sort;const arr=ST.dir===-1?'▼':'▲';h+=`<th class="${sr?'sorted':''}" data-arr="${sr?arr:''}" onclick="setSort('${c.k}')">${c.l}</th>`});
  h+=`</tr></thead><tbody>`;
  if(list.length===0){h+=`<tr><td colspan="${cols.length}"><div class="empty">Sin leads en este filtro</div></td></tr>`}
  list.forEach(r=>{
    const open=ST.openRows.has(r.id);
    const src=r.utm_source_normalized||'none';
    const badge=src==='facebook'?'<span class="badge badge-fb">FB</span>'
               :src==='instagram'?'<span class="badge badge-ig">IG</span>'
               :src==='facebook-instagram'?'<span class="badge badge-fbig">FB+IG</span>'
               :src==='none'?'<span class="badge badge-org">Orgánico</span>'
               :`<span class="badge badge-none">${esc(src)}</span>`;
    h+=`<tr class="${open?'open':''}" onclick="toggleRow('${r.id}')">
      <td class="mono">${fmtFecha(r.fecha)}<span style="color:var(--text-subtle);margin-left:4px">${fmtTime(r.fecha)}</span></td>
      <td class="name">${esc(r.nombre||'—')}</td>
      <td class="muted">${esc(r.correo||'—')}</td>
      <td class="muted mono">${esc(r.telefono||'—')}</td>
      <td>${badge}</td>
      <td class="muted" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.utm_campaign||'—')}</td>
      <td class="muted" style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.utm_content||'—')}</td>
    </tr>`;
    if(open){
      h+=`<tr class="detail-row"><td colspan="${cols.length}"><div class="detail-wrap">
        <div class="detail-mi"><div class="l">UTM source</div><div class="v${!r.utm_source?' empty':''}">${r.utm_source?esc(r.utm_source):'sin valor'}</div></div>
        <div class="detail-mi"><div class="l">UTM medium</div><div class="v${!r.utm_medium?' empty':''}">${r.utm_medium?esc(r.utm_medium):'sin valor'}</div></div>
        <div class="detail-mi"><div class="l">UTM adset</div><div class="v${!r.utm_adset?' empty':''}">${r.utm_adset?esc(r.utm_adset):'sin valor'}</div></div>
        <div class="detail-mi"><div class="l">UTM campaign</div><div class="v${!r.utm_campaign?' empty':''}">${r.utm_campaign?esc(r.utm_campaign):'sin valor'}</div></div>
        <div class="detail-mi"><div class="l">UTM content</div><div class="v${!r.utm_content?' empty':''}">${r.utm_content?esc(r.utm_content):'sin valor'}</div></div>
        <div class="detail-mi"><div class="l">Source first click</div><div class="v${!r.utm_source_first_click?' empty':''}">${r.utm_source_first_click?esc(r.utm_source_first_click):'sin valor'}</div></div>
        <div class="detail-mi"><div class="l">Campaign first click</div><div class="v${!r.utm_campaign_first_click?' empty':''}">${r.utm_campaign_first_click?esc(r.utm_campaign_first_click):'sin valor'}</div></div>
        <div class="detail-mi"><div class="l">Content first click</div><div class="v${!r.utm_content_first_click?' empty':''}">${r.utm_content_first_click?esc(r.utm_content_first_click):'sin valor'}</div></div>
        <div class="detail-mi"><div class="l">Estado</div><div class="v${!r.estado?' empty':''}">${r.estado?esc(r.estado):'sin valor'}</div></div>
        <div class="detail-mi"><div class="l">ID</div><div class="v">${esc(r.id||'')}</div></div>
        <div class="detail-mi"><div class="l">Fecha completa</div><div class="v">${esc((r.fecha||'').replace('T',' ').slice(0,19))}</div></div>
        <div class="detail-mi"><div class="l">Synced at</div><div class="v">${esc((r.synced_at||'').replace('T',' ').slice(0,19))}</div></div>
      </div></td></tr>`;
    }
  });
  h+=`</tbody></table>`;
  document.getElementById('tblwrap').innerHTML=h;
}

function setSort(k){if(ST.sort===k)ST.dir=-ST.dir;else{ST.sort=k;ST.dir=-1}render()}
function toggleRow(id){if(ST.openRows.has(id))ST.openRows.delete(id);else ST.openRows.add(id);render()}

document.querySelectorAll('.preset').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.preset').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');ST.preset=b.dataset.preset;applyPreset();render();
}));
document.querySelectorAll('.src').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.src').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');ST.src=b.dataset.src;render();
}));
['fromD','toD'].forEach(id=>{
  document.getElementById(id).addEventListener('change',e=>{
    ST[id==='fromD'?'from':'to']=e.target.value;
    if(ST.preset!=='custom'){ST.preset='custom';document.querySelectorAll('.preset').forEach(x=>x.classList.remove('active'))}
    render();
  });
});
document.getElementById('search').addEventListener('input',e=>{ST.q=e.target.value.trim();render()});

document.getElementById('exportCsv').addEventListener('click',()=>{
  const list=sorted(filtered());
  const cols=['fecha','nombre','correo','telefono','utm_source','utm_source_normalized','utm_medium','utm_campaign','utm_adset','utm_content','utm_source_first_click','utm_campaign_first_click','utm_content_first_click','estado'];
  const header=cols.join(',');
  const rows=list.map(r=>cols.map(c=>{
    let v=r[c]||'';
    if(c==='fecha')v=fmtFecha(v)+' '+fmtTime(r.fecha);
    v=String(v).replace(/"/g,'""');
    return `"${v}"`;
  }).join(','));
  const csv=[header,...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`sarahi-utm-leads-${ST.from}-${ST.to}.csv`;a.click();URL.revokeObjectURL(url);
});

// tooltip global
const TT=document.createElement('div');TT.id='tt';document.body.appendChild(TT);
document.addEventListener('mouseover',e=>{const el=e.target.closest('[data-tip]');if(!el)return;TT.textContent=el.getAttribute('data-tip');const r=el.getBoundingClientRect();TT.style.left=r.left+'px';TT.style.top=(r.bottom+8)+'px';TT.classList.add('on')});
document.addEventListener('mouseout',e=>{if(!e.target.closest||!e.target.closest('[data-tip]'))return;TT.classList.remove('on')});

loadAll().catch(e=>{document.getElementById('tblwrap').innerHTML='<div class="loader">Error: '+(e.message||e)+'</div>';console.error(e)});
</script>
</body>
</html>
