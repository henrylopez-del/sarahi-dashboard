<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarahi Jaramillo · Meta Ads · Ainnovation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gray-50:#FAFAFA;--gray-100:#F4F4F5;--gray-200:#E4E4E7;--gray-300:#D4D4D8;
    --gray-400:#A1A1AA;--gray-500:#71717A;--gray-600:#52525B;--gray-700:#3F3F46;
    --gray-800:#27272A;--gray-900:#18181B;
    --success-50:#F0FDF4;--success-100:#DCFCE7;--success-500:#22C55E;--success-600:#16A34A;--success-700:#15803D;
    --warn-50:#FFFBEB;--warn-100:#FEF3C7;--warn-500:#F59E0B;--warn-700:#B45309;
    --danger-50:#FEF2F2;--danger-100:#FEE2E2;--danger-500:#EF4444;--danger-700:#B91C1C;
    --brand-50:#EFF6FF;--brand-100:#DBEAFE;--brand-500:#3B82F6;--brand-600:#2563EB;--brand-700:#1D4ED8;
    --violet-50:#F5F3FF;--violet-100:#EDE9FE;--violet-200:#DDD6FE;--violet-500:#8B5CF6;--violet-700:#6D28D9;
    --fb-500:#1877F2;--ig-500:#E1306C;
    --bg:var(--gray-50);--surface:#FFFFFF;--border:var(--gray-200);--border-strong:var(--gray-300);
    --text:var(--gray-900);--text-muted:var(--gray-500);--text-subtle:var(--gray-400);
    --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;
    --shadow-xs:0 1px 2px 0 rgba(0,0,0,.04);
    --shadow-sm:0 1px 3px 0 rgba(0,0,0,.06),0 1px 2px -1px rgba(0,0,0,.04);
    --shadow-md:0 4px 12px -2px rgba(0,0,0,.06),0 2px 4px -2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter Tight',-apple-system,sans-serif;font-feature-settings:"ss01","cv11","tnum";-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh}
  body{padding:24px}
  .wrap{max-width:1440px;margin:0 auto}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:40px;height:40px;border-radius:var(--r-md);background:var(--gray-900);color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px;letter-spacing:-.02em}
  .brand-meta .eyebrow{font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:-.005em;line-height:1.2}
  .brand-meta h1{font-size:20px;font-weight:600;letter-spacing:-.02em;line-height:1.3;color:var(--text)}
  .header-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}
  .status-chip{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--success-50);border:1px solid var(--success-100);border-radius:999px;font-size:12px;font-weight:500;color:var(--success-700)}
  .status-chip .dot{width:6px;height:6px;background:var(--success-500);border-radius:50%;box-shadow:0 0 0 0 rgba(34,197,94,.5);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 6px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .meta-date{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums}

  /* FILTER BAR */
  .fbar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 16px;margin-bottom:14px;display:flex;flex-wrap:wrap;align-items:center;gap:10px 18px}
  .fgroup{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .fgroup>label{font-size:11px;font-weight:500;color:var(--text-muted);margin-right:4px;letter-spacing:-.005em}
  .fbar .sep{width:1px;height:22px;background:var(--border)}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--border);background:var(--surface);border-radius:var(--r-sm);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .12s;font-family:inherit;white-space:nowrap}
  .chip:hover{background:var(--gray-50);border-color:var(--border-strong);color:var(--text)}
  .chip.active{background:var(--gray-900);border-color:var(--gray-900);color:#fff}
  .chip.ghost{background:transparent}
  .chip.danger{color:var(--danger-700);border-color:var(--danger-100);background:var(--danger-50)}
  .chip.danger:hover{background:var(--danger-100)}
  .chip svg{width:12px;height:12px}
  .date-input{font-family:inherit;font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);background:var(--surface);font-variant-numeric:tabular-nums;cursor:pointer}
  .date-input.month-pick{min-width:120px;font-weight:500}
  .date-input:hover{border-color:var(--border-strong)}
  .date-input:focus{outline:2px solid var(--violet-200);outline-offset:-1px;border-color:var(--violet-500)}
  .date-range-pop{display:none;gap:6px;align-items:center}
  .date-range-pop.on{display:inline-flex}
  .compare-wrap{background:var(--violet-50);padding:6px 10px;border-radius:var(--r-md);display:none;gap:10px 14px;align-items:center;flex-wrap:wrap;border:1px dashed var(--violet-200)}
  .compare-wrap.on{display:inline-flex}
  .compare-wrap>label{font-size:11px;font-weight:500;color:var(--violet-700);letter-spacing:-.005em}

  /* CONTENT */
  .content{display:grid;grid-template-columns:1fr;gap:14px}
  .content.compare{grid-template-columns:1fr 1fr}
  @media(max-width:1200px){.content.compare{grid-template-columns:1fr}}
  .col-head{font-size:11px;font-weight:600;color:var(--text-muted);padding:6px 12px;background:var(--gray-100);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .col-head .rng{color:var(--text-subtle);font-weight:400;font-variant-numeric:tabular-nums}
  .col.A .col-head{background:var(--violet-50);border-color:var(--violet-100);color:var(--violet-700)}
  .col.B .col-head{background:var(--brand-50);border-color:var(--brand-100);color:var(--brand-700)}

  /* SECTION */
  .sec{margin-bottom:12px}

  /* KPIs */
  .kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .compare .kpi-row{grid-template-columns:repeat(3,1fr)}
  @media(max-width:1024px){.kpi-row,.compare .kpi-row{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:640px){.kpi-row,.compare .kpi-row{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;transition:border-color .15s,box-shadow .15s}
  .kpi:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm)}
  .kpi-label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:500;color:var(--text-muted);margin-bottom:10px;letter-spacing:-.005em}
  .kpi-icon{width:20px;height:20px;border-radius:var(--r-sm);display:grid;place-items:center;background:var(--gray-100);color:var(--gray-600);flex-shrink:0}
  .kpi-icon svg{width:12px;height:12px}
  .kpi-value{font-size:24px;font-weight:600;letter-spacing:-.03em;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
  .kpi-sub{margin-top:6px;font-size:11px;color:var(--text-muted)}
  .kpi-sub .trend-up{color:var(--success-600);font-weight:500}
  .kpi-sub .trend-dn{color:var(--danger-700);font-weight:500}
  .kpi-sub .trend-flat{color:var(--text-subtle);font-weight:500}
  .kpi.primary{background:var(--gray-900);border-color:var(--gray-900)}
  .kpi.primary .kpi-label{color:var(--gray-400)}
  .kpi.primary .kpi-icon{background:var(--gray-800);color:var(--gray-300)}
  .kpi.primary .kpi-value{color:#fff}
  .kpi.primary .kpi-sub{color:var(--gray-400)}
  .kpi.primary .kpi-sub .trend-up{color:var(--success-500)}

  /* PANEL */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
  .panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
  .panel-title{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.01em}
  .panel-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
  .panel-badge{font-size:11px;font-weight:500;color:var(--text-muted);padding:3px 10px;background:var(--gray-100);border-radius:999px;white-space:nowrap}

  /* 2-column grid */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .compare .grid-2{grid-template-columns:1fr}
  @media(max-width:900px){.grid-2{grid-template-columns:1fr}}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .compare .grid-3{grid-template-columns:1fr}
  @media(max-width:900px){.grid-3{grid-template-columns:1fr}}

  /* Platform cards (panel variant) */
  .plat-card .panel-head{margin-bottom:12px}
  .plat-card.fb .plat-icon{background:#DBEAFE;color:var(--fb-500)}
  .plat-card.ig .plat-icon{background:#FCE7F3;color:var(--ig-500)}
  .plat-icon{width:28px;height:28px;border-radius:var(--r-sm);display:grid;place-items:center;flex-shrink:0}
  .plat-icon svg{width:15px;height:15px}
  .plat-mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .plat-mi{padding:10px 12px;background:var(--gray-50);border:1px solid var(--border);border-radius:var(--r-md)}
  .plat-mi .n{font-size:18px;font-weight:600;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;color:var(--text)}
  .plat-mi .l{font-size:10px;font-weight:500;color:var(--text-muted);margin-top:4px;letter-spacing:-.005em}

  /* TABLE */
  .table-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
  .table-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .table-head h2{font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--text)}
  .table-head .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tblwrap{max-height:560px;overflow:auto}
  .compare .tblwrap{max-height:460px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;padding:10px 14px;background:var(--gray-50);font-size:11px;font-weight:500;color:var(--text-muted);letter-spacing:-.005em;border-bottom:1px solid var(--border);user-select:none;cursor:pointer;position:sticky;top:0;z-index:1;white-space:nowrap}
  thead th:hover{background:var(--gray-100);color:var(--text)}
  thead th.sorted{background:var(--gray-100);color:var(--text);font-weight:600}
  thead th.sorted::after{content:attr(data-arr);margin-left:4px;font-size:10px}
  thead th.num{text-align:right}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
  tbody tr:last-child{border-bottom:0}
  tbody tr:hover td{background:var(--gray-50)}
  tbody td{padding:10px 14px;color:var(--text);font-variant-numeric:tabular-nums;font-size:13px;vertical-align:middle}
  tbody td.name{font-weight:500}
  tbody td.num{text-align:right;white-space:nowrap}
  tbody td.muted{color:var(--text-muted)}
  .ad-row{cursor:pointer}
  .ad-row.open td{background:var(--violet-50)}
  .ad-detail-row{display:none}
  .ad-detail-row.open{display:table-row}
  .ad-detail-wrap{padding:16px 18px;background:var(--gray-50);border-top:1px solid var(--border)}
  .ad-detail-head{display:flex;gap:14px;margin-bottom:12px;align-items:flex-start}
  .ad-thumb{width:88px;height:88px;flex-shrink:0;background:var(--gray-100);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--text-subtle);font-size:12px}
  .ad-thumb img{width:100%;height:100%;object-fit:cover}
  .ad-body{font-size:12px;color:var(--text);line-height:1.5;max-height:74px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;margin-bottom:8px}
  .ad-meta{font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:6px;margin-top:8px}
  .mi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px}
  .mi .n{font-size:13px;font-weight:600;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
  .mi .l{font-size:10px;color:var(--text-muted);margin-top:3px;font-weight:500}
  .plat-split-line{margin-top:10px;display:flex;gap:16px;font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums;flex-wrap:wrap}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:-.005em;border:1px solid transparent;white-space:nowrap}
  .badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
  .badge-success{background:var(--success-50);color:var(--success-700);border-color:var(--success-100)}
  .badge-warn{background:var(--warn-50);color:var(--warn-700);border-color:var(--warn-100)}
  .badge-danger{background:var(--danger-50);color:var(--danger-700);border-color:var(--danger-100)}
  .badge-neutral{background:var(--gray-100);color:var(--gray-500);border-color:var(--border)}
  .badge-brand{background:var(--brand-50);color:var(--brand-700);border-color:var(--brand-100)}
  .badge-violet{background:var(--violet-50);color:var(--violet-700);border-color:var(--violet-100)}
  .badge-fb{background:#DBEAFE;color:#1D4ED8;border-color:#BFDBFE}
  .badge-ig{background:#FCE7F3;color:#9D174D;border-color:#FBCFE8}

  /* Funnel bars */
  .funnel-list{display:flex;flex-direction:column;gap:12px}
  .funnel-row{display:flex;flex-direction:column;gap:5px}
  .funnel-row .g-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .funnel-row .g-name{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px}
  .funnel-row .g-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
  .funnel-row .g-nums{font-size:13px;font-variant-numeric:tabular-nums;color:var(--text);font-weight:500}
  .funnel-row .g-nums .total{color:var(--text-muted);font-weight:400;margin-left:2px}
  .funnel-row .g-track{height:6px;background:var(--gray-100);border-radius:999px;overflow:hidden}
  .funnel-row .g-fill{height:100%;transition:width .7s cubic-bezier(.22,1,.36,1)}
  .funnel-row .g-meta{display:flex;gap:10px;font-size:11px;color:var(--text-muted)}
  .funnel-row .g-meta .src{font-style:normal}
  .funnel-row .g-meta .conv{margin-left:auto;font-variant-numeric:tabular-nums}

  /* Event bars (stacked style) */
  .ev-list{display:flex;flex-direction:column;gap:10px}
  .ev-row{display:flex;flex-direction:column;gap:4px}
  .ev-head{display:flex;justify-content:space-between;align-items:center}
  .ev-label{font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px}
  .ev-label .g-dot{width:8px;height:8px;border-radius:2px}
  .ev-desc{font-size:11px;color:var(--text-muted);margin-top:-2px}
  .ev-nums{font-size:12px;font-variant-numeric:tabular-nums;color:var(--text);font-weight:500}
  .ev-nums .pct{color:var(--text-muted);font-weight:400;margin-left:4px;font-size:11px}
  .ev-track{height:6px;background:var(--gray-100);border-radius:999px;overflow:hidden}
  .ev-fill{height:100%;transition:width .6s cubic-bezier(.22,1,.36,1)}

  /* Traffic cards */
  .traffic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .compare .traffic-grid{grid-template-columns:1fr}
  @media(max-width:900px){.traffic-grid{grid-template-columns:1fr}}
  .tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
  .tcard .tc-label{font-size:11px;font-weight:500;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .tcard .tc-label .g-dot{width:8px;height:8px;border-radius:2px}
  .tcard .tc-value{font-size:26px;font-weight:600;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;color:var(--text)}
  .tcard .tc-sub{font-size:11px;color:var(--text-muted);margin-top:6px;font-variant-numeric:tabular-nums}

  /* Breakdown rows */
  .br-list{display:flex;flex-direction:column}
  .br-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
  .br-row:last-child{border-bottom:none}
  .br-row .l{color:var(--text);font-weight:500;max-width:62%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .br-row .v{font-variant-numeric:tabular-nums;font-weight:500;color:var(--text)}
  .br-row .v .leads{color:var(--success-600);margin-left:6px;font-size:11px;font-weight:500}

  /* Empty */
  .empty{padding:20px;text-align:center;color:var(--text-subtle);font-size:12px;background:var(--gray-50);border:1px dashed var(--border);border-radius:var(--r-md)}

  /* Loader */
  .loader{text-align:center;padding:80px 20px;color:var(--text-muted);font-size:13px}
  .loader-dot{display:inline-block;width:6px;height:6px;background:var(--gray-400);border-radius:50%;margin:0 2px;animation:ld 1.4s infinite ease-in-out}
  .loader-dot:nth-child(2){animation-delay:.2s}.loader-dot:nth-child(3){animation-delay:.4s}
  @keyframes ld{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

  .footer{margin-top:24px;display:flex;justify-content:space-between;font-size:12px;color:var(--text-subtle)}

  /* Pagination */
  .paginate{padding:10px;display:flex;justify-content:center;gap:6px;border-top:1px solid var(--border);background:var(--gray-50)}

  /* Tooltip — JS attached to body */
  #tt{position:fixed;background:var(--gray-900);color:#fff;padding:8px 10px;border-radius:var(--r-sm);font-size:11px;font-weight:400;letter-spacing:-.005em;white-space:normal;max-width:260px;z-index:9999;pointer-events:none;box-shadow:var(--shadow-md);line-height:1.45;font-family:'Inter Tight',sans-serif;opacity:0;transition:opacity .12s;transform:translateY(2px)}
  #tt.on{opacity:1;transform:translateY(0)}
  #tt::before{content:'';position:absolute;top:-4px;left:12px;border:4px solid transparent;border-bottom-color:var(--gray-900);border-top:0}

  /* GHL overrides */
  .c-section .inner,.c-row .inner,.c-column .inner,.c-section>.inner,.c-row>.inner,.c-column>.inner,.inner,.vertical.inner{max-width:100vw!important;width:100vw!important;padding:0!important;margin:0!important}
  .c-section,.c-row,.c-column,.c-wrapper,.c-custom-code,.fullSection,[id^="section-"],[id^="row-"],[id^="col-"],[id^="custom-code-"]{max-width:100vw!important;width:100vw!important;padding:0!important;margin:0!important;background:transparent!important;border:none!important;overflow:visible!important}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <div class="logo">A.</div>
      <div class="brand-meta">
        <div class="eyebrow">Ainnovation · Meta Ads Reporting</div>
        <h1>Sarahi Jaramillo</h1>
      </div>
    </div>
    <div class="header-actions">
      <span class="meta-date" id="syncMeta">cargando…</span>
      <span class="status-chip"><span class="dot"></span>En vivo</span>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="fbar">
    <div class="fgroup">
      <label>Periodo A</label>
      <button class="chip preset" data-col="A" data-preset="7d" data-tip="Últimos 7 días: de hoy menos 6 días hasta hoy">7d</button>
      <button class="chip preset" data-col="A" data-preset="30d" data-tip="Últimos 30 días: rolling window desde hoy hacia atrás">30d</button>
      <button class="chip preset active" data-col="A" data-preset="mtd" data-tip="Month-to-date: del día 1 del mes actual hasta hoy">MTD</button>
      <button class="chip preset" data-col="A" data-preset="lm" data-tip="Mes calendario pasado completo (día 1 al último día)">Mes pasado</button>
      <input type="month" class="date-input month-pick" data-col="A" data-tip="Selecciona cualquier mes calendario completo (ene, feb, mar…)">
      <button class="chip preset" data-col="A" data-preset="all" data-tip="Todo el histórico disponible desde que inició el tracking (sept 2025)">Histórico</button>

<script>
const SB_URL='https://fneppfjeywhayknrgahe.supabase.co';
const SB_KEY='sb_publishable_zLroeuC3ZrE-K_zVGFwi3Q_UyYG6ZYB';
const FB_ICO='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>';
const IG_ICO='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>';

const RAW={};
const ST={
  plat:'all',compare:false,
  A:{preset:'mtd',from:null,to:null,sort:'spend',dir:-1,limit:15,openAds:new Set(),orgSort:'engagement',orgDir:-1},

async function sb(t,p=''){const u=`${SB_URL}/rest/v1/${t}?${p}`;const r=await fetch(u,{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}});return r.json()}
const fmt=n=>{if(n==null||isNaN(n))return '0';n=Number(n);if(Math.abs(n)>=1e6)return (n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3)return (n/1e3).toFixed(1)+'k';return Math.round(n).toLocaleString('es-MX')};
const money=n=>'$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});
const pct=(a,b)=>b>0?((a/b)*100).toFixed(1)+'%':'—';
const esc=s=>{const d=document.createElement('div');d.textContent=s||'';return d.innerHTML};
const iso=d=>d.toISOString().slice(0,10);
const today=()=>new Date();
function presetRange(p){
  const t=today();const start=new Date(t);
  if(p==='today')return [iso(t),iso(t)];
  if(p==='7d'){start.setDate(t.getDate()-6);return [iso(start),iso(t)]}
  if(p==='30d'){start.setDate(t.getDate()-29);return [iso(start),iso(t)]}
  if(p==='mtd')return [iso(new Date(t.getFullYear(),t.getMonth(),1)),iso(t)];
  if(p==='lm'){const s=new Date(t.getFullYear(),t.getMonth()-1,1),e=new Date(t.getFullYear(),t.getMonth(),0);return [iso(s),iso(e)]}
  if(p==='all')return ['2020-01-01',iso(t)];
  return [iso(start),iso(t)];
}

async function loadAll(){
  const [ads,adDaily,acctDaily,pixelDaily,utm,tags,opps,breakdowns,organic,sync,customFields]=await Promise.all([
    sb('sarahi_meta_ads','select=*'),
    sb('sarahi_meta_ad_daily','select=*&limit=5000'),
    sb('sarahi_meta_account_daily','select=*&limit=500'),
    sb('sarahi_meta_pixel_daily','select=*&limit=500'),
    sb('sarahi_meta_utm_leads','select=id,fecha,correo,utm_source_normalized,utm_content,utm_campaign&limit=5000'),
    sb('sarahi_ghl_contact_tags','select=*&limit=2000'),
    sb('sarahi_ghl_opportunities','select=contact_id,stage_name,status,monetary_value,created_at&limit=500'),
    sb('sarahi_meta_breakdowns','select=*&order=spend.desc'),
    sb('sarahi_meta_organic_posts','select=*&order=created_time.desc.nullslast&limit=500'),
    sb('sarahi_meta_sync_log','select=*&order=pulled_at.desc&limit=1'),
    sb('sarahi_ghl_custom_field_values','select=contact_id,field_name,value&field_name=in.(Utm_content,Utm_content_first_click)&limit=5000')
  ]);
  Object.assign(RAW,{ads,adDaily,acctDaily,pixelDaily,utm,tags,opps,breakdowns,organic,sync,customFields});
  const dates=[...adDaily,...acctDaily,...pixelDaily].map(r=>r.day).filter(Boolean).sort();
  RAW.minDate=dates[0]||'2026-03-01';RAW.maxDate=dates[dates.length-1]||iso(today());
  const s=(sync[0]||{});

function applyAllPresets(){
  for(const k of ['A','B']){
    const s=ST[k];
    if(s.preset!=='custom'){const [f,t]=presetRange(s.preset);s.from=f;s.to=t;
      document.getElementById('from'+k).value=f;document.getElementById('to'+k).value=t}
  }
}

function aggregate(col){
  const s=ST[col],from=s.from,to=s.to;
  const platFilter=(ad)=>{
    if(ST.plat==='all')return true;
    const fs=Number(ad.fb_spend||0),is=Number(ad.ig_spend||0);
    if(ST.plat==='facebook')return fs>=is;
    if(ST.plat==='instagram')return is>fs;
    return true;
  };
  const platShare={};
  RAW.ads.forEach(a=>{const fs=Number(a.fb_spend||0),is=Number(a.ig_spend||0),tot=fs+is||1;platShare[a.ad_id]={fb:fs/tot,ig:is/tot,majority:is>fs?'ig':'fb'}});
  const adAgg={};
  RAW.adDaily.forEach(r=>{
    if(r.day<from||r.day>to)return;
    if(!adAgg[r.ad_id])adAgg[r.ad_id]={ad_id:r.ad_id,spend:0,impressions:0,clicks:0,lpv:0,lead_pixel:0,wa_conv:0,fb_spend:0,ig_spend:0,fb_impressions:0,ig_impressions:0,fb_clicks:0,ig_clicks:0,days:0};
    const x=adAgg[r.ad_id],sh=platShare[r.ad_id]||{fb:.5,ig:.5};
    x.spend+=Number(r.spend||0);x.impressions+=Number(r.impressions||0);x.clicks+=Number(r.clicks||0);
    x.lpv+=Number(r.lpv||0);x.lead_pixel+=Number(r.lead_pixel||0);x.wa_conv+=Number(r.wa_conv||0);x.days++;
    x.fb_spend+=Number(r.spend||0)*sh.fb;x.ig_spend+=Number(r.spend||0)*sh.ig;
    x.fb_impressions+=Number(r.impressions||0)*sh.fb;x.ig_impressions+=Number(r.impressions||0)*sh.ig;
    x.fb_clicks+=Number(r.clicks||0)*sh.fb;x.ig_clicks+=Number(r.clicks||0)*sh.ig;
  });
  const ads=[];
  Object.values(adAgg).forEach(x=>{
    const meta=RAW.ads.find(a=>a.ad_id===x.ad_id);if(!meta)return;if(!platFilter(meta))return;
    const sh=platShare[x.ad_id]||{majority:'fb'};
    ads.push({...meta,...x,platform:sh.majority,ctr:x.impressions>0?(x.clicks/x.impressions*100):0,cpc:x.clicks>0?(x.spend/x.clicks):0});
  });
  // Filtrar placeholders sin renderizar ({{ad.name}}, {{campaign.name}}) y IDs crudos numéricos (>10 dígitos seguidos)
  const isPlaceholder=v=>!v||/\{\{.*\}\}/.test(v)||/^\d{10,}$/.test(v.trim());
  const utmsInRange=RAW.utm.filter(u=>{const d=(u.fecha||'').slice(0,10);return d>=from&&d<=to});
  const leadsByContent={};
  utmsInRange.forEach(u=>{if(u.utm_content&&!isPlaceholder(u.utm_content)){leadsByContent[u.utm_content]=(leadsByContent[u.utm_content]||0)+1}});
  const norm=s=>(s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,' ').trim();

  // Build groups: normalized_name → [ads]  and  ad_id → ad
  const adsByNormName={},adsById={};
  ads.forEach(a=>{a.leads_attr=0;a.agendaron_attr=0;a.compraron_attr=0;a.video_visto_attr=0;
    const n=norm(a.name);if(n)(adsByNormName[n]=adsByNormName[n]||[]).push(a);
    adsById[a.ad_id]=a;
  });
  // Pick winner ad (highest spend in period) for a given utm_content key
  function winnerAd(utmKey){
    if(!utmKey)return null;
    if(adsById[utmKey])return adsById[utmKey];
    const list=adsByNormName[norm(utmKey)];
    if(!list||!list.length)return null;
    return list.reduce((best,a)=>Number(a.spend||0)>Number(best.spend||0)?a:best,list[0]);
  }

  // 1. Leads UTM per ad (winner-take-all to highest spend)
  Object.entries(leadsByContent).forEach(([k,v])=>{const w=winnerAd(k);if(w)w.leads_attr+=v});

  // 2. Contact-level attribution for tags (agendó / compró / video visto)
  const contactUtm={};
  (RAW.customFields||[]).forEach(r=>{
    if(!r.value)return;
    if(r.field_name==='Utm_content_first_click')contactUtm[r.contact_id]=r.value;
    else if(r.field_name==='Utm_content'&&!contactUtm[r.contact_id])contactUtm[r.contact_id]=r.value;
  });
  const emailUtm={};
  RAW.utm.forEach(u=>{const em=(u.correo||'').toLowerCase().trim();if(em&&u.utm_content&&!emailUtm[em])emailUtm[em]=u.utm_content});
  // Group unique emails per tag per utm_content, then attribute winner
  const tagsByUtm={agendo:{},compro:{},lt:{},videoVisto:{}};
  RAW.tags.forEach(t=>{
    if(!t.date_added||t.date_added.slice(0,10)<from||t.date_added.slice(0,10)>to)return;
    const em=(t.email||'').toLowerCase().trim();if(!em||em.includes('test'))return;
    // También excluir test accounts por nombre (ej: "Sarahi test" con email no-test)
    const nm=((t.first_name||'')+' '+(t.last_name||'')).toLowerCase();
    if(nm.includes('test')||nm.includes('prueba'))return;
    const utm=contactUtm[t.contact_id]||emailUtm[em];if(!utm)return;
    const bucket=t.tag_name==='agendo-cita'?tagsByUtm.agendo
                :t.tag_name==='compro'?tagsByUtm.compro
                :t.tag_name==='curso - reestructura y factura'?tagsByUtm.lt
                :t.tag_name==='video-visto'?tagsByUtm.videoVisto:null;
    if(!bucket)return;
    (bucket[utm]=bucket[utm]||new Set()).add(em);
  });
  Object.entries(tagsByUtm.agendo).forEach(([utm,set])=>{const w=winnerAd(utm);if(w)w.agendaron_attr+=set.size});
  Object.entries(tagsByUtm.compro).forEach(([utm,set])=>{const w=winnerAd(utm);if(w)w.compraron_attr+=set.size});
  Object.entries(tagsByUtm.lt).forEach(([utm,set])=>{const w=winnerAd(utm);if(w)w.compraron_attr+=set.size});
  Object.entries(tagsByUtm.videoVisto).forEach(([utm,set])=>{const w=winnerAd(utm);if(w)w.video_visto_attr+=set.size});
  const sumF=f=>ads.reduce((s,a)=>s+Number(a[f]||0),0);
  const T={
    spend:sumF('spend'),impressions:sumF('impressions'),clicks:sumF('clicks'),lpv:sumF('lpv'),
    fb_spend:sumF('fb_spend'),ig_spend:sumF('ig_spend'),
    fb_impressions:sumF('fb_impressions'),ig_impressions:sumF('ig_impressions'),
    fb_clicks:sumF('fb_clicks'),ig_clicks:sumF('ig_clicks'),
    ads_count:ads.length
  };
  T.ctr=T.impressions>0?(T.clicks/T.impressions*100):0;
  T.cpc=T.clicks>0?(T.spend/T.clicks):0;
  T.fb_ctr=T.fb_impressions>0?(T.fb_clicks/T.fb_impressions*100):0;
  T.ig_ctr=T.ig_impressions>0?(T.ig_clicks/T.ig_impressions*100):0;
  const px={};
  RAW.pixelDaily.filter(r=>r.day>=from&&r.day<=to).forEach(r=>{px[r.event_name]=(px[r.event_name]||0)+Number(r.count||0)});
  const fbLeads=utmsInRange.filter(u=>u.utm_source_normalized==='facebook').length;
  const igLeads=utmsInRange.filter(u=>u.utm_source_normalized==='instagram').length;
  const orgLeads=utmsInRange.filter(u=>!['facebook','instagram'].includes(u.utm_source_normalized)).length;
  T.leads_fb=fbLeads;T.leads_ig=igLeads;T.leads_org=orgLeads;T.leads_all=utmsInRange.length;
  T.cpl=(fbLeads+igLeads)>0?T.spend/(fbLeads+igLeads):0;
  const byTag={};
  RAW.tags.filter(t=>t.date_added&&t.date_added.slice(0,10)>=from&&t.date_added.slice(0,10)<=to).forEach(t=>{
    const em=(t.email||'').toLowerCase().trim();if(!em||em.includes('test'))return;
    // También excluir test accounts por nombre (ej: "Sarahi test" con email no-test)
    const nm=((t.first_name||'')+' '+(t.last_name||'')).toLowerCase();
    if(nm.includes('test')||nm.includes('prueba'))return;
    (byTag[t.tag_name]=byTag[t.tag_name]||new Set()).add(em);
  });
  const tagU=n=>(byTag[n]||new Set()).size;
  const formFillsUnique=new Set(utmsInRange.map(u=>(u.correo||'').toLowerCase().trim()).filter(e=>e&&!e.includes('test'))).size;
  const F={
    form_fills:formFillsUnique,
    comprometido:tagU('comprometido'),
    video_visto:tagU('video-visto'),
    calificacion:tagU('calificacion-enviada'),
    high_ticket:tagU('high-ticket'),
    agendaron:tagU('agendo-cita'),
    no_show:tagU('no show llamada'),
    mentalidad_free:tagU('curso - mentalidad beauty boss'),
    compraron_ht:tagU('compro'),
    compraron_lt:tagU('curso - reestructura y factura')
  };
  F.asistieron=Math.max(0,F.agendaron-F.no_show);
  // breakdowns filtered by matching period (period_start/period_end match user range, or period CONTAINS user range)
  const bdInPeriod=RAW.breakdowns.filter(b=>{
    if(!b.period_start||!b.period_end)return false;
    return b.period_start<=from&&b.period_end>=to;
  });
  const demo=bdInPeriod.filter(b=>b.dimension==='age_gender').sort((a,b)=>Number(b.spend||0)-Number(a.spend||0)).slice(0,8);
  const geo=bdInPeriod.filter(b=>b.dimension==='country').sort((a,b)=>Number(b.spend||0)-Number(a.spend||0)).slice(0,8);
  const plc=bdInPeriod.filter(b=>b.dimension==='placement').sort((a,b)=>Number(b.spend||0)-Number(a.spend||0)).slice(0,8);
  // detect which period matched (for UI label)
  const bdMatchPeriod=bdInPeriod[0]?(bdInPeriod[0].period_start+' → '+bdInPeriod[0].period_end):null;
  return {T,ads,px,F,demo,geo,plc,utmsInRange,from,to,bdMatchPeriod};
}

function sortedAds(col,ads){
  const s=ST[col],k=s.sort,d=s.dir;
  return [...ads].sort((a,b)=>{
    let va=a[k],vb=b[k];
    if(['name','effective_status','platform'].includes(k)){va=(va||'').toString();vb=(vb||'').toString();return va.localeCompare(vb)*(d===-1?1:-1)}
    return (Number(vb||0)-Number(va||0))*(d===-1?1:-1);
  });
}

function delta(a,b,inv){
  if(b==null||b===0)return a>0?'<span class="trend-up">nuevo</span>':'<span class="trend-flat">—</span>';
  const p=((a-b)/Math.abs(b))*100;
  if(Math.abs(p)<1)return '<span class="trend-flat">±0%</span>';
  const up=p>0,good=inv?!up:up;
  return `<span class="${good?'trend-up':'trend-dn'}">${up?'+':''}${p.toFixed(0)}%</span>`;
}

function renderColumn(col,data,other){
  const {T,ads,px,F,demo,geo,plc,bdMatchPeriod}=data;

  const shown=sortedAdList.slice(0,ST[col].limit);
  const cmp=ST.compare&&other?other.T:null;
  const cmpF=ST.compare&&other?other.F:null;
  const s=ST[col],sk=s.sort,sd=s.dir;

  let h=`<div class="col ${col}">`;
  h+=`<div class="col-head"><span>${col==='A'?'Periodo A':'Periodo B'}</span><span class="rng">${data.from} → ${data.to}</span></div>`;

  // KPIs
  h+=`<section class="sec"><div class="kpi-row">
    <div class="kpi primary">
      <div class="kpi-label" data-tip="Gasto publicitario total en Meta Ads (Facebook + Instagram) en el periodo seleccionado. Moneda: MXN. Suma de spend diario por ad."><span class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 6v2m0 8v2"/></svg></span>Inversión</div>
      <div class="kpi-value">${money(T.spend)}</div>
      <div class="kpi-sub" data-tip="CPM = Costo Por Mil impresiones. Benchmark MX/LATAM: $50-$150 es normal, >$300 empieza a ser caro">CPM $${T.impressions>0?(T.spend/T.impressions*1000).toFixed(2):'0.00'} · ${cmp?delta(T.spend,cmp.spend):T.ads_count+' ads'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label" data-tip="Número total de veces que tus anuncios se mostraron en pantalla. Incluye apariciones repetidas a la misma persona (una persona puede ver el ad 10 veces)."><span class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>Impresiones</div>
      <div class="kpi-value">${fmt(T.impressions)}</div>
      <div class="kpi-sub" data-tip="Total de clicks en cualquier parte del anuncio: link, imagen, perfil, like, etc. No todos terminan en landing page.">${fmt(T.clicks)} clicks · ${cmp?delta(T.impressions,cmp.impressions):'—'}</div>
    </div>
    <div class="kpi">

  };
  const pxTot=Object.values(px).reduce((a,b)=>a+b,0);
  const pxMx=Math.max(...Object.values(px),1);
  h+=`<section class="sec"><div class="panel"><div class="panel-head"><div><div class="panel-title">Eventos pixel</div><div class="panel-sub">Señales que Meta recibe de la web</div></div><span class="panel-badge">${fmt(pxTot)} eventos</span></div>
    <div class="ev-list">`;
  evOrd.forEach(e=>{
    const v=px[e]||0;const w=v>0?(v/pxMx*100):0;
    h+=`<div class="ev-row">
      <div class="ev-head"><div class="ev-label" data-tip="${esc(evTip[e]||'')}"><span class="g-dot" style="background:${evC[e]}"></span>${e}</div><div class="ev-nums">${fmt(v)}<span class="pct">${v>0?pct(v,pxTot):'0%'}</span></div></div>
      <div class="ev-track">${v>0?`<div class="ev-fill" style="width:${Math.max(w,2)}%;background:${evC[e]}"></div>`:''}</div>
      <div class="ev-desc">${evDesc[e]}</div>
    </div>`;
  });
  h+=`</div></div></section>`;

  // BREAKDOWNS (filtered by period)
  const bdSub=bdMatchPeriod?`Periodo ${bdMatchPeriod}`:'Sin breakdowns para este rango — usa MTD, mes pasado o 7d';
  const emptyBd='<div class="empty">sin breakdowns para este rango · disponible solo en MTD, mes pasado, 7d</div>';
  h+=`<section class="sec"><div class="grid-3">
    <div class="panel"><div class="panel-head"><div><div class="panel-title" data-tip="Gasto por grupo de edad × género según Meta. Útil para ver si tu audiencia pagada coincide con tu ICP. Ordenado por spend desc.">Edad × Género</div><div class="panel-sub">${bdSub}</div></div></div>
      <div class="br-list">${demo.length?demo.map(d=>`<div class="br-row"><span class="l">${esc(d.key)}</span><span class="v">${money(d.spend)}${d.leads?`<span class="leads" data-tip="Leads generados por este segmento según Meta (no es lo mismo que UTM del form — Meta cuenta su propia atribución)">${d.leads}L</span>`:''}</span></div>`).join(''):emptyBd}</div>
    </div>
    <div class="panel"><div class="panel-head"><div><div class="panel-title" data-tip="Gasto por país donde se mostró el ad. Detecta si estás gastando en países fuera de tu mercado objetivo (desperdicio).">País</div><div class="panel-sub">${bdSub}</div></div></div>
      <div class="br-list">${geo.length?geo.map(g=>`<div class="br-row"><span class="l">${esc(g.key)}</span><span class="v">${money(g.spend)}${g.leads?`<span class="leads">${g.leads}L</span>`:''}</span></div>`).join(''):emptyBd}</div>
    </div>
    <div class="panel"><div class="panel-head"><div><div class="panel-title" data-tip="Dónde (placement) se muestran tus ads: IG Feed, IG Stories, FB Feed, Reels, Marketplace, Audience Network, etc. Útil para excluir placements de baja calidad.">Placements</div><div class="panel-sub">${bdSub}</div></div></div>
      <div class="br-list">${plc.length?plc.map(p=>`<div class="br-row"><span class="l">${esc(p.key)}</span><span class="v">${money(p.spend)}${p.leads?`<span class="leads">${p.leads}L</span>`:''}</span></div>`).join(''):emptyBd}</div>
    </div>
  </div></section>`;

  // ORGANIC (filtered by created_time in period, sortable)
  const orgCols=[
    {k:'message',l:'Post',align:'left',tip:'Caption del post. Hover sobre la fila para ver el texto completo si está cortado.'},
    {k:'platform',l:'Plat',align:'left',tip:'FB = publicado en Facebook Page · IG = publicado en Instagram'},
    {k:'created_time',l:'Publicado',align:'left',tip:'Fecha de publicación del post en la plataforma'},
    {k:'reach',l:'Reach',align:'num',tip:'Personas únicas que vieron el post. No cuenta repeticiones — métrica de alcance real.'},
    {k:'impressions',l:'Impr',align:'num',tip:'Impresiones: veces que el post se mostró en pantalla (incluye a la misma persona múltiples veces)'},
    {k:'likes',l:'Likes',align:'num',tip:'Reacciones positivas: like + heart + wow + etc. Señal básica de aprobación.'},
    {k:'comments',l:'Comments',align:'num',tip:'Comentarios dejados. Más valioso que likes — implica engagement activo.'},
    {k:'shares',l:'Shares',align:'num',tip:'Veces que alguien compartió el post. La señal más fuerte de resonancia — la persona quiso que otros lo vean.'},
    {k:'saves',l:'Saves',align:'num',tip:'Guardados (solo Instagram). Señal fuerte: la persona quiere volver a verlo. Excelente predictor de valor percibido.'},
    {k:'engagement',l:'Eng.',align:'num',tip:'Engagement total = likes + comments + shares + saves + clicks. Métrica agregada.'},
  ];
  const orgSort=ST[col].orgSort,orgDir=ST[col].orgDir;
  const organicInPeriod=RAW.organic.filter(p=>{
    if(!p.created_time)return false;
    const d=p.created_time.slice(0,10);
    return d>=data.from&&d<=data.to;
  }).sort((a,b)=>{
    let va=a[orgSort],vb=b[orgSort];
    if(['message','platform','created_time'].includes(orgSort)){va=(va||'').toString();vb=(vb||'').toString();return va.localeCompare(vb)*(orgDir===-1?1:-1)}
    return (Number(vb||0)-Number(va||0))*(orgDir===-1?1:-1);
  });
  h+=`<section class="sec"><div class="table-panel"><div class="table-head"><div><h2>Publicaciones orgánicas</h2><div class="panel-sub">Posts publicados en el periodo · click en encabezado para ordenar</div></div><span class="panel-badge">${organicInPeriod.length} posts</span></div>`;
  if(organicInPeriod.length>0){
    h+=`<div class="tblwrap"><table><thead><tr>`;
    orgCols.forEach(c=>{const sr=c.k===orgSort;const arr=orgDir===-1?'▼':'▲';h+=`<th class="${c.align==='num'?'num':''} ${sr?'sorted':''}" data-arr="${sr?arr:''}" data-tip="${esc(c.tip||'')}" onclick="setOrgSort('${col}','${c.k}')">${c.l}</th>`});
    h+=`</tr></thead><tbody>`;
    organicInPeriod.slice(0,20).forEach(p=>{
      const tag=p.platform==='instagram'?'<span class="badge badge-ig">IG</span>':'<span class="badge badge-fb">FB</span>';
      const dt=p.created_time?new Date(p.created_time).toLocaleDateString('es-MX',{day:'2-digit',month:'short'}):'—';
      h+=`<tr><td class="name" style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(p.message||'')}">${esc((p.message||'(sin caption)').slice(0,100))}</td><td>${tag}</td><td class="muted">${dt}</td><td class="num">${fmt(p.reach)}</td><td class="num">${fmt(p.impressions)}</td><td class="num">${fmt(p.likes)}</td><td class="num">${fmt(p.comments)}</td><td class="num">${fmt(p.shares)}</td><td class="num">${fmt(p.saves)}</td><td class="num">${fmt(p.engagement)}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  } else h+=`<div style="padding:18px"><div class="empty">Sin posts orgánicos en este periodo</div></div>`;
  h+=`</div></section>`;

  h+=`</div>`;
  return h;
}

function render(){
  const dA=aggregate('A');
  const dB=ST.compare?aggregate('B'):null;
  const c=document.getElementById('content');
  c.className='content'+(ST.compare?' compare':'');
  c.innerHTML=renderColumn('A',dA,dB)+(dB?renderColumn('B',dB,dA):'');
}

function setSort(col,k){const s=ST[col];if(s.sort===k)s.dir=-s.dir;else{s.sort=k;s.dir=-1}render()}
function setOrgSort(col,k){const s=ST[col];if(s.orgSort===k)s.orgDir=-s.orgDir;else{s.orgSort=k;s.orgDir=-1}render()}
function toggleAd(col,id){const s=ST[col].openAds;if(s.has(id))s.delete(id);else s.add(id);render()}
function setLimit(col,n){ST[col].limit=n;render()}

document.querySelectorAll('.preset').forEach(b=>b.addEventListener('click',()=>{
  const col=b.dataset.col,p=b.dataset.preset;
  document.querySelectorAll(`.preset[data-col="${col}"]`).forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  ST[col].preset=p;
  document.getElementById('range'+col).classList.toggle('on',p==='custom');
  if(p!=='custom'){const [f,t]=presetRange(p);ST[col].from=f;ST[col].to=t;
    document.getElementById('from'+col).value=f;document.getElementById('to'+col).value=t}
  render();
}));
['A','B'].forEach(col=>{['from','to'].forEach(k=>{
  document.getElementById(k+col).addEventListener('change',e=>{
    ST[col][k]=e.target.value;
    if(ST[col].preset!=='custom'){ST[col].preset='custom';
      document.querySelectorAll(`.preset[data-col="${col}"]`).forEach(x=>x.classList.toggle('active',x.dataset.preset==='custom'));
      document.getElementById('range'+col).classList.add('on')}
    render();
  });
})});
// Month picker: set from/to to full calendar month
document.querySelectorAll('.month-pick').forEach(inp=>{
  inp.addEventListener('change',e=>{
    const v=e.target.value;if(!v)return;
    const col=e.target.dataset.col;
    const [y,m]=v.split('-').map(Number);
    const start=new Date(y,m-1,1),end=new Date(y,m,0);
    ST[col].from=iso(start);ST[col].to=iso(end);ST[col].preset='custom';
    document.querySelectorAll(`.preset[data-col="${col}"]`).forEach(x=>x.classList.remove('active'));
    document.getElementById('from'+col).value=ST[col].from;
    document.getElementById('to'+col).value=ST[col].to;
    document.getElementById('range'+col).classList.add('on');
    render();
  });
});
document.querySelectorAll('.plat').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.plat').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');ST.plat=b.dataset.plat;render();
}));
document.getElementById('toggleCompare').addEventListener('click',()=>{
  ST.compare=!ST.compare;
  document.getElementById('compareCtl').classList.toggle('on',ST.compare);
  document.getElementById('toggleCompare').classList.toggle('active',ST.compare);
  render();
});
document.getElementById('closeCompare').addEventListener('click',()=>{
  ST.compare=false;
  document.getElementById('compareCtl').classList.remove('on');
  document.getElementById('toggleCompare').classList.remove('active');
  render();
});

// tooltip
const TT=document.createElement('div');TT.id='tt';document.body.appendChild(TT);
document.addEventListener('mouseover',e=>{const el=e.target.closest('[data-tip]');if(!el)return;const tip=el.getAttribute('data-tip');if(!tip)return;TT.textContent=tip;const r=el.getBoundingClientRect();let left=r.left,top=r.bottom+8;TT.style.left=left+'px';TT.style.top=top+'px';TT.classList.add('on');requestAnimationFrame(()=>{const tr=TT.getBoundingClientRect();if(tr.right>window.innerWidth-8){TT.style.left=(window.innerWidth-tr.width-8)+'px'}if(tr.bottom>window.innerHeight-8){TT.style.top=(r.top-tr.height-8)+'px'}})});
document.addEventListener('mouseout',e=>{if(!e.target.closest||!e.target.closest('[data-tip]'))return;TT.classList.remove('on')});

loadAll().catch(e=>{document.getElementById('content').innerHTML='<div class="loader">Error: '+(e.message||e)+'</div>';console.error(e)});
</script>
</body>
</html>
